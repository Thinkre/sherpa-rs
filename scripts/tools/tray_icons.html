<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tray Icons Generator</title>
    <style>
      body {
        font-family: system-ui;
        padding: 20px;
        background: #f5f5f5;
      }
      .icon-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-width: 900px;
      }
      .icon-card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .icon-card h3 {
        margin: 0 0 15px 0;
        font-size: 14px;
        color: #666;
      }
      .icon-preview {
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: center;
      }
      .icon-wrapper {
        text-align: center;
      }
      .icon-wrapper p {
        margin: 10px 0 0 0;
        font-size: 12px;
        color: #999;
      }
      .light-bg {
        background: #f0f0f0;
        padding: 10px;
        border-radius: 4px;
      }
      .dark-bg {
        background: #2a2a2a;
        padding: 10px;
        border-radius: 4px;
      }
      button {
        margin-top: 20px;
        padding: 10px 20px;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #7c3aed;
      }
    </style>
  </head>
  <body>
    <h1>Tray Icons for KeVoiceInput</h1>
    <p>
      Right-click on each icon and "Save Image As..." to save as PNG (44x44 @ 2x
      for macOS)
    </p>

                height="18"
                rx="6"
                fill="rgba(0,0,0,0.7)"
              />
              <line
                x1="22"
                y1="30"
                x2="22"
                y2="36"
                stroke="rgba(0,0,0,0.7)"
                stroke-width="2"
                stroke-linecap="round"

              <line
                x1="17"
                y1="36"
                x2="27"
                y2="36"
                stroke="rgba(0,0,0,0.7)"
                stroke-width="2"
                stroke-linecap="round"

            </svg>
            <p>Light Mode</p>
          </div>
          <div class="icon-wrapper dark-bg">

                y="12"
                width="12"
                height="18"
                rx="6"

              <line

                y2="36"

                stroke-width="2"
                stroke-linecap="round"

              <line

    <button onclick="downloadAllIcons()">Download All Icons as PNGs</button>

    <script>
      function svgToPng(svgElement, filename) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const img = new Image();

        canvas.width = 44;
        canvas.height = 44;

        img.onload = function () {
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(function (blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          });
        };

        img.src =
          "data:image/svg+xml;base64," +
          btoa(unescape(encodeURIComponent(svgData)));
      }

      function downloadAllIcons() {
        const icons = [
          "tray_idle",
          "tray_idle_dark",
          "tray_recording",
          "tray_recording_dark",
          "tray_transcribing",
          "tray_transcribing_dark",
        ];

        icons.forEach((id, index) => {
          setTimeout(() => {
            const svg = document.getElementById(id);
            svgToPng(svg, id + ".png");
          }, index * 500);
        });
      }
    </script>

</html>
