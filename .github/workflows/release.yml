name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.0.2

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          NOTES=$(awk -v version="$VERSION" '
            BEGIN { found = 0; collecting = 0 }
            /^## \[/ {
              if (collecting) { exit }
              if (index($0, "[" version "]") > 0) {
                collecting = 1
                next
              }
            }
            collecting && /./ { print $0 }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi

          # Save to file to handle multiline
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: v${{ steps.get_version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Windows dependencies
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          # Verify required build tools (windows-latest already has MSVC and Windows SDK)
          cmake --version

          # TODO: Set up sherpa-onnx library for Windows builds
          # See docs/CI_CD_WINDOWS.md for implementation options:
          #   1. Download pre-built binaries from sherpa-onnx releases (recommended)
          #   2. Build from source during CI (~10 minutes)
          #   3. Use project's own release assets
          #
          # Example for pre-built binaries:
          # $SherpaVersion = "1.10.0"
          # $SherpaUrl = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SherpaVersion}/sherpa-onnx-v${SherpaVersion}-win-x64-shared.tar.bz2"
          # Invoke-WebRequest -Uri $SherpaUrl -OutFile "sherpa-onnx.tar.bz2"
          # tar -xf sherpa-onnx.tar.bz2
          # $SherpaPath = "$PWD\sherpa-onnx-v${SherpaVersion}-win-x64-shared\lib"
          # echo "SHERPA_LIB_PATH=$SherpaPath" >> $env:GITHUB_ENV
          #
          # For now, if SHERPA_LIB_PATH is not set, build will use vendored binaries or fail
          # Uncomment and configure when ready to enable Windows CI builds

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # macOS code signing (optional)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bun run tauri build -- --target ${{ matrix.target }}

      - name: Prepare artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          ARCH=${{ matrix.arch }}

          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos

          # Create tarball for updater
          tar -czf "KeVoiceInput-${VERSION}-macos-${ARCH}.app.tar.gz" KeVoiceInput.app

          # Move to release directory
          mkdir -p "${{ github.workspace }}/release-out"
          mv "KeVoiceInput-${VERSION}-macos-${ARCH}.app.tar.gz" "${{ github.workspace }}/release-out/"

          # Copy signature
          if [ -f "KeVoiceInput.app.tar.gz.sig" ]; then
            cp "KeVoiceInput.app.tar.gz.sig" "${{ github.workspace }}/release-out/KeVoiceInput-${VERSION}-macos-${ARCH}.app.tar.gz.sig"
          fi

          # Copy DMG for distribution
          cd ../dmg
          if ls KeVoiceInput*.dmg 1> /dev/null 2>&1; then
            cp KeVoiceInput*.dmg "${{ github.workspace }}/release-out/KeVoiceInput-${VERSION}-macos-${ARCH}.dmg"
          fi

      - name: Prepare artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          ARCH=${{ matrix.arch }}

          cd src-tauri/target/${{ matrix.target }}/release/bundle

          # Find AppImage
          if ls appimage/*.AppImage 1> /dev/null 2>&1; then
            mkdir -p "${{ github.workspace }}/release-out"
            APPIMAGE=$(ls appimage/*.AppImage | head -1)

            # Create tarball for updater
            tar -czf "KeVoiceInput-${VERSION}-linux-${ARCH}.AppImage.tar.gz" -C appimage "$(basename $APPIMAGE)"
            mv "KeVoiceInput-${VERSION}-linux-${ARCH}.AppImage.tar.gz" "${{ github.workspace }}/release-out/"

            # Copy signature
            if [ -f "${APPIMAGE}.tar.gz.sig" ]; then
              cp "${APPIMAGE}.tar.gz.sig" "${{ github.workspace }}/release-out/KeVoiceInput-${VERSION}-linux-${ARCH}.AppImage.tar.gz.sig"
            fi

            # Copy AppImage for distribution
            cp "$APPIMAGE" "${{ github.workspace }}/release-out/KeVoiceInput-${VERSION}-linux-${ARCH}.AppImage"
          fi

          # Find deb package
          if ls deb/*.deb 1> /dev/null 2>&1; then
            DEB=$(ls deb/*.deb | head -1)
            cp "$DEB" "${{ github.workspace }}/release-out/KeVoiceInput-${VERSION}-linux-${ARCH}.deb"
          fi

      - name: Prepare artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $ARCH = "${{ matrix.arch }}"

          cd src-tauri/target/${{ matrix.target }}/release/bundle

          # Find MSI
          if (Test-Path "msi\*.msi") {
            New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\release-out" | Out-Null
            $MSI = Get-ChildItem -Path "msi\*.msi" | Select-Object -First 1

            # Create zip for updater (PowerShell has built-in Compress-Archive)
            Compress-Archive -Path $MSI.FullName -DestinationPath "KeVoiceInput-${VERSION}-windows-${ARCH}.msi.zip" -Force
            Move-Item "KeVoiceInput-${VERSION}-windows-${ARCH}.msi.zip" "${{ github.workspace }}\release-out\" -Force

            # Copy signature
            $SigFile = "$($MSI.FullName).zip.sig"
            if (Test-Path $SigFile) {
              Copy-Item $SigFile "${{ github.workspace }}\release-out\KeVoiceInput-${VERSION}-windows-${ARCH}.msi.zip.sig"
            }

            # Copy MSI for distribution
            Copy-Item $MSI.FullName "${{ github.workspace }}\release-out\KeVoiceInput-${VERSION}-windows-${ARCH}.msi"
          }

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release-out/*
          fail_on_unmatched_files: false

  update-latest-json:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-out

      - name: Generate latest.json
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/generate-latest-json.sh
          RELEASE_OUT_DIR=release-out ./scripts/generate-latest-json.sh ${{ needs.create-release.outputs.version }}

      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json for v${{ needs.create-release.outputs.version }}"
          git push origin main

      - name: Upload latest.json to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./latest.json
          asset_name: latest.json
          asset_content_type: application/json
